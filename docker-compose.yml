# /opt/stack/livetranslator/docker-compose.yml
x-common-env: &common_env
  TZ: Africa/Cairo
  PUID: "1001"
  PGID: "988"
  UVICORN_WORKERS: "1"
  HTTP_TIMEOUT: "30"

x-common-deploy: &common_deploy
  restart: always
  user: "1001:988"
  deploy:
    resources:
      limits:
        cpus: "2.0"
        memory: 2048M

networks:
  stack_appnet:
    external: true
    name: stack_appnet

volumes:
  pg_data:
    driver: local
    driver_opts: { type: none, o: bind, device: /opt/stack/livetranslator/data/pg }
  redis_data:
    driver: local
    driver_opts: { type: none, o: bind, device: /opt/stack/livetranslator/data/redis }
  models_store:
    driver: local
    driver_opts: { type: none, o: bind, device: /opt/stack/livetranslator/data/models }
  audio_buf:
    driver: local
    driver_opts: { type: none, o: bind, device: /opt/stack/livetranslator/data/audio }
  api_logs:
    driver: local
    driver_opts: { type: none, o: bind, device: /opt/stack/livetranslator/data/logs }

services:
  postgres:
    image: postgres:16
    networks: [stack_appnet]
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-livetranslator}
      POSTGRES_USER: ${POSTGRES_USER:-livetranslator}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL","pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7
    networks: [stack_appnet]
    command: ["redis-server","--appendonly","yes","--dir","/data"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD","redis-cli","ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    container_name: api
    build:
      context: ./api
      dockerfile: Dockerfile
    <<: *common_deploy
    env_file: [.env]
    environment:
      <<: *common_env
      LT_ENV: prod
      LT_DOMAIN: livetranslator.pawelgawliczek.cloud
      LT_DB_URL: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
      LT_REDIS_URL: redis://redis:6379/5
      LT_JWT_SECRET_FILE: /run/secrets/jwt_secret
      LT_GOOGLE_CLIENT_ID_FILE: /run/secrets/google_oauth_client_id.txt
      LT_GOOGLE_CLIENT_SECRET_FILE: /run/secrets/google_oauth_client_secret.txt
      GOOGLE_REDIRECT_URI: https://livetranslator.pawelgawliczek.cloud/auth/google/callback
      LT_AUDIO_DIR: /data/audio
      LT_MODELS_DIR: /models
      LT_MT_BASE_URL: http://mt_worker:8081
      HTTP_TIMEOUT: 30
      UVICORN_CMD_ARGS: "--no-access-log --log-level warning"
      LOG_LEVEL: "WARNING"
    depends_on:
      redis: { condition: service_healthy }
      postgres: { condition: service_healthy }
      mt_worker: { condition: service_started }
    volumes:
      - api_logs:/logs
      - audio_buf:/data/audio
      - models_store:/models:ro
      - /opt/stack/secrets:/run/secrets:ro
    networks:
      stack_appnet: { aliases: [api] }
    ports: ["9003:8000"]
    healthcheck:
      test: ["CMD","curl","-f","http://localhost:8000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  stt_worker:
    build:
      context: ./workers/stt
      dockerfile: Dockerfile
    <<: *common_deploy
    environment:
      PYTHONUNBUFFERED: "1"
      <<: *common_env
      REDIS_URL: redis://redis:6379/5
      STT_CHAN_LOCAL_IN: stt_local_in
      WHISPER_MODEL: ${WHISPER_MODEL:-base}
      CHUNK_MS: ${CHUNK_MS:-400}
      COMPUTE_TYPE: int8
      NUM_THREADS: ${NUM_THREADS:-4}
      CONDITION_ON_PREVIOUS_TEXT: ${CONDITION_ON_PREVIOUS_TEXT:-true}
      MAX_REDECODE_SEC: ${MAX_REDECODE_SEC:-3}
      VAD: "true"
      AUDIO_DIR: /data/audio
      MODELS_DIR: /models
      HF_HOME: /models/.cache
      TRANSFORMERS_CACHE: /models/.cache
      HOME: /home/app
    depends_on:
      redis: { condition: service_healthy }
    volumes:
      - audio_buf:/data/audio
      - models_store:/models
    networks: [stack_appnet]
    healthcheck:
      test: ["CMD","python","-c","print(1)"]
      interval: 30s
      timeout: 5s
      retries: 5

  mt_worker:
    build:
      context: ./workers/mt
      dockerfile: Dockerfile
    environment:
      <<: *common_env
      MODELS_DIR: /models
      PORT: "8081"
      DEBUG_MT: "1"
      PYTHONUNBUFFERED: "1"
    volumes:
      - models_store:/models
      - ./workers/mt/app.py:/app/app.py:ro
    networks: [stack_appnet]
    healthcheck:
      test: ["CMD","curl","-f","http://localhost:8081/health"]
      interval: 30s
      timeout: 5s
      retries: 5

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    restart: always
    networks: [stack_appnet]

  stt_router:
    build:
      context: ./api/routers/stt
      dockerfile: Dockerfile
    restart: always
    environment:
      PYTHONUNBUFFERED: "1"
      REDIS_URL: redis://redis:6379/5
      POSTGRES_DSN: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
      STT_INPUT_CHANNEL: stt_input
      STT_OUTPUT_CHANNEL: stt_local_in
      LT_STT_PARTIAL_MODE: ${LT_STT_PARTIAL_MODE:-local}
      LT_STT_FINAL_MODE: ${LT_STT_FINAL_MODE:-openai_chunked}
      STT_OUTPUT_EVENTS: stt_events
      # Multi-provider STT API keys
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_STT_MODEL: ${OPENAI_STT_MODEL:-whisper-1}
      DEEPGRAM_API_KEY: ${DEEPGRAM_API_KEY:-}
      DEEPGRAM_MODEL: ${DEEPGRAM_MODEL:-nova-3}
      SPEECHMATICS_API_KEY: ${SPEECHMATICS_API_KEY:-}
      SPEECHMATICS_REGION: ${SPEECHMATICS_REGION:-eu2}
      GOOGLE_APPLICATION_CREDENTIALS: ${GOOGLE_APPLICATION_CREDENTIALS:-}
      GOOGLE_CLOUD_PROJECT: ${GOOGLE_CLOUD_PROJECT:-}
      GOOGLE_CLOUD_LOCATION: ${GOOGLE_CLOUD_LOCATION:-us}
      AZURE_SPEECH_KEY: ${AZURE_SPEECH_KEY:-}
      AZURE_SPEECH_REGION: ${AZURE_SPEECH_REGION:-eastus}
      SONIOX_API_KEY: ${SONIOX_API_KEY:-}
    volumes:
      - /opt/stack/secrets:/opt/stack/secrets:ro
    depends_on:
      redis: { condition: service_healthy }
      postgres: { condition: service_healthy }
    networks: [stack_appnet]

  mt_router:
    build:
      context: ./api/routers/mt
      dockerfile: Dockerfile
    restart: always
    environment:
      PYTHONUNBUFFERED: "1"
      REDIS_URL: redis://redis:6379/5
      POSTGRES_DSN: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
      MT_INPUT_CHANNEL: mt_requests
      MT_OUTPUT_CHANNEL: mt_events
      LT_MT_MODE: ${LT_MT_MODE:-openai}
      LT_MT_MODE_PARTIAL: ${LT_MT_MODE_PARTIAL:-local}
      LT_MT_MODE_FINAL: ${LT_MT_MODE_FINAL:-openai}
      LT_DEFAULT_TGT: ${LT_DEFAULT_TGT:-en}
      LT_MT_BASE_URL: http://mt_worker:8081
      STT_EVENTS_CHANNEL: stt_events
      # Multi-provider MT API keys
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MT_MODEL: ${OPENAI_MT_MODEL:-gpt-4o-mini}
      DEEPL_API_KEY: ${DEEPL_API_KEY:-}
      AZURE_TRANSLATOR_KEY: ${AZURE_TRANSLATOR_KEY:-}
      AZURE_TRANSLATOR_REGION: ${AZURE_TRANSLATOR_REGION:-eastus}
      AZURE_TRANSLATOR_ENDPOINT: ${AZURE_TRANSLATOR_ENDPOINT:-https://api.cognitive.microsofttranslator.com}
    depends_on:
      redis: { condition: service_healthy }
      postgres: { condition: service_healthy }
      mt_worker: { condition: service_started }
    networks: [stack_appnet]

  cost_tracker:
    build:
      context: ./api/services
      dockerfile: Dockerfile
    restart: always
    environment:
      PYTHONUNBUFFERED: "1"
      REDIS_URL: redis://redis:6379/5
      POSTGRES_DSN: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
      COST_TRACKING_CHANNEL: cost_events
      OPENAI_PRICE_WHISPER_PER_MIN: ${OPENAI_PRICE_WHISPER_PER_MIN:-0.006}
      OPENAI_PRICE_GPT4OMINI_INPUT_PER_1K: ${OPENAI_PRICE_GPT4OMINI_INPUT_PER_1K:-0.00015}
      OPENAI_PRICE_GPT4OMINI_OUTPUT_PER_1K: ${OPENAI_PRICE_GPT4OMINI_OUTPUT_PER_1K:-0.0006}
    depends_on:
      redis: { condition: service_healthy }
      postgres: { condition: service_healthy }
    networks: [stack_appnet]

  persistence:
    build:
      context: ./api/services
      dockerfile: Dockerfile
    restart: always
    environment:
      PYTHONUNBUFFERED: "1"
      REDIS_URL: redis://redis:6379/5
      POSTGRES_DSN: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
    depends_on:
      redis: { condition: service_healthy }
      postgres: { condition: service_healthy }
    networks: [stack_appnet]
    volumes:
      - ./api/services/persistence_service.py:/app/persistence_service.py:ro
    command: ["python", "persistence_service.py"]

  room_cleanup:
    image: livetranslator-api:latest
    restart: always
    environment:
      <<: *common_env
      PYTHONUNBUFFERED: "1"
      POSTGRES_DSN: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
      ROOM_CLEANUP_INTERVAL: "300"  # Check every 5 minutes
      ADMIN_ABSENT_THRESHOLD: "30"  # Delete rooms after 30 minutes
    depends_on:
      postgres: { condition: service_healthy }
      api: { condition: service_started }
    networks: [stack_appnet]
    command: ["python", "-m", "api.services.room_cleanup_service"]
