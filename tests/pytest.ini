[pytest]
# Pytest configuration for LiveTranslator tests

# Minimum version
minversion = 8.0

# Test discovery patterns
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Additional command line options
addopts =
    # Verbose output
    -v
    # Show short test summary
    -ra
    # Show local variables in tracebacks
    --showlocals
    # Strict markers - fail on unknown markers
    --strict-markers
    # Strict config - fail on unknown config options
    --strict-config
    # Disable warnings summary
    --disable-warnings
    # Coverage (optional, enable with --cov)
    # --cov=api
    # --cov=workers
    # --cov-report=html
    # --cov-report=term-missing

# Test markers
markers =
    unit: Unit tests (fast, no I/O)
    integration: Integration tests (require services)
    e2e: End-to-end tests (slow, require full stack)
    slow: Slow tests
    websocket: WebSocket-related tests
    provider: Provider integration tests
    database: Database-related tests
    redis: Redis-related tests
    auth: Authentication tests
    api: API endpoint tests
    frontend: Frontend tests

# Asyncio mode
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

# Log settings
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

log_file = tests/logs/pytest.log
log_file_level = DEBUG
log_file_format = %(asctime)s [%(levelname)s] %(name)s: %(message)s
log_file_date_format = %Y-%m-%d %H:%M:%S

# Timeout (prevents hanging tests)
timeout = 300

# Parallel execution (use with pytest-xdist)
# addopts = -n auto

# Coverage settings
[coverage:run]
source = api,workers
omit =
    */tests/*
    */test_*.py
    */__pycache__/*
    */venv/*
    */migrations/*

[coverage:report]
precision = 2
show_missing = true
skip_covered = false

[coverage:html]
directory = tests/htmlcov
